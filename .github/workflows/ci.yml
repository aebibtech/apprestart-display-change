name: Build and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Extract Version from CMake
      id: extract_version
      shell: bash
      run: |
        VERSION=$(grep -oP 'project\(.*VERSION\s+\K[0-9.]+' CMakeLists.txt)
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config Release

    - name: Generate Artifact Attestation
      uses: actions/attest-build-provenance@v1
      with:
        subject-path: ${{github.workspace}}/build/Release/DisplayMonitor.exe

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DisplayMonitor-Windows
        path: ${{github.workspace}}/build/Release/DisplayMonitor.exe

    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.extract_version.outputs.VERSION }}
        name: Release v${{ steps.extract_version.outputs.VERSION }}
        body: |
          Automated release for version ${{ steps.extract_version.outputs.VERSION }}.
          
          This release includes a GitHub Artifact Attestation. You can verify the integrity of the binary using the GitHub CLI:
          `gh attestation verify DisplayMonitor.exe --owner ${{ github.repository_owner }}`
        files: ${{github.workspace}}/build/Release/DisplayMonitor.exe
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
